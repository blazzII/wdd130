<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Your title should be about 50-60 characters and meaningful</title>
    <meta
      name="description"
      content="WDD 130 Practice creating a data table."
    />
    <link rel="stylesheet" href="css/table.css" />
  </head>
  <body>
    <table>
      <tr>
        <th class="title" colspan="2">Wasatch Systems</th>
      </tr>
      <tr>
        <th>Customer</th>
        <th>Total Sales</th>
      </tr>
      <tr>
        <td>Brian Heath</td>
        <td>$456.43</td>
      </tr>
      <tr>
        <td>Mylan Rocco</td>
        <td>$403.10</td>
      </tr>
      <tr class="highlight">
        <td>Sarah Huang</td>
        <td>$1456.30 💖</td>
      </tr>
      <tr>
        <td>Lupe Rodriguez</td>
        <td>$500.93</td>
      </tr>
      <tr>
        <td>Ethel Smith</td>
        <td>$1156.13</td>
      </tr>
    </table>
  </body>
</html>
